<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset de Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <a class="logo-link" href="/">
        <img class="logo-image" src="images/Logo_Igor.png" alt="Engenheiro Platform" />
        <span class="logo-text">Engenheiro Platform</span>
      </a>
      <nav class="nav">
        <a href="/">Voltar</a>
      </nav>
    </header>

    <main class="section">
      <div class="section-head">
        <h2>Redefinir senha</h2>
        <p>Informe a nova senha para concluir o reset.</p>
      </div>

      <form class="form" id="reset-password-form">
        <label>
          Nova senha
          <input type="password" name="password" minlength="6" required />
        </label>
        <button class="btn primary" type="submit">Atualizar senha</button>
        <p class="form-status" id="reset-status"></p>
      </form>
    </main>

    <script src="/reset-password.js"></script>
  </body>
</html>
